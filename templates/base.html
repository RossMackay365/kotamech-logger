<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Kotamech Log Server{% endblock %}</title>
    <style>
        :root {
            --bg: #f7f7f8;
            --panel: #ffffff;
            --border: #d9d9de;
            --text: #1d1d1f;
            --muted: #6b6b73;
            --accent: #2f5fde;
            --hover: #eef2fc;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        header.topbar {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
        }
        .crumbs { font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
        .crumbs a { color: var(--muted); }
        h1 { margin: 0; font-size: 1.4rem; font-weight: 600; }

        .btn {
            display: inline-block;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            color: var(--text);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .btn:hover { background: var(--hover); text-decoration: none; }
        .topbar-row { display: flex; align-items: center; gap: 16px; }
        .topbar-title { min-width: 0; }
        .back-bar { flex: none; }

        main { padding: 24px; max-width: 1200px; margin: 0 auto; }

        /* Two-panel 50/50 layout */
        .panels { display: flex; gap: 20px; align-items: flex-start; }
        .panel {
            flex: 1 1 0;
            min-width: 0;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
        }
        .panel.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-style: italic;
            min-height: 200px;
        }

        /* Searchable list of links */
        .search {
            width: 100%;
            padding: 9px 12px;
            font-size: 0.95rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 14px;
            background: #fff;
            color: var(--text);
        }
        .search:focus { outline: none; border-color: var(--accent); }
        ul.nav-list { list-style: none; margin: 0; padding: 0; }
        ul.nav-list li a {
            display: block;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
            color: var(--text);
            background: #fff;
        }
        ul.nav-list li a:hover { background: var(--hover); text-decoration: none; }
        .empty-note { color: var(--muted); font-style: italic; }
        h2.panel-title { margin: 0 0 14px; font-size: 1.05rem; font-weight: 600; }

        /* Chart panel */
        .panel.chart-panel { display: flex; flex-direction: column; min-height: 380px; }
        .chart-head {
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px; margin-bottom: 14px; flex-wrap: wrap;
        }
        .chart-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
        .chart-tab {
            padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px;
            background: #fff; color: var(--muted); cursor: pointer; font-size: 0.82rem;
        }
        .chart-tab:hover { background: var(--hover); }
        .chart-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .chart-controls { display: flex; gap: 8px; }
        .chart-controls select {
            padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px;
            background: #fff; color: var(--text); font-size: 0.82rem;
        }
        .chart-body { position: relative; flex: 1 1 auto; min-height: 300px; }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-row">
            {% block back %}{% endblock %}
            <div class="topbar-title">
                {% block crumbs %}{% endblock %}
                <h1>{% block heading %}Kotamech Log Server{% endblock %}</h1>
            </div>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        // Wire each .search box to filter the nav-list that follows it.
        document.querySelectorAll("input.search").forEach(function (box) {
            var list = box.parentElement.querySelector("ul.nav-list");
            if (!list) return;
            box.addEventListener("input", function () {
                var q = box.value.trim().toLowerCase();
                list.querySelectorAll("li").forEach(function (li) {
                    var match = li.textContent.toLowerCase().indexOf(q) !== -1;
                    li.style.display = match ? "" : "none";
                });
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
